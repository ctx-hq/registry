name = "ctx-api"
main = "src/index.ts"
compatibility_date = "2025-03-27"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.getctx.org", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "ctx-registry"
database_id = "REDACTED_D1_DATABASE_ID"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "FORMULAS"
bucket_name = "ctx-formulas"

[[kv_namespaces]]
binding = "CACHE"
id = "REDACTED_KV_NAMESPACE_ID"

[[vectorize]]
binding = "VECTORIZE"
index_name = "ctx-packages"

[ai]
binding = "AI"

[[queues.producers]]
binding = "ENRICHMENT_QUEUE"
queue = "ctx-enrichment"

[[queues.consumers]]
queue = "ctx-enrichment"
max_batch_size = 10
max_batch_timeout = 30

[vars]
API_VERSION = "v1"
GITHUB_CLIENT_ID = ""

# [triggers]
# crons = ["0 */6 * * *"]
